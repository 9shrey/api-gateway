version: "3.8"

services:
  # =============================================
  # Redis — distributed rate limiting store
  # =============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # =============================================
  # Example backend servers (3 instances)
  # =============================================
  backend-1:
    build:
      context: .
      target: backend
    command: ["-port", "8081", "-name", "backend-1"]
    ports:
      - "8081:8081"

  backend-2:
    build:
      context: .
      target: backend
    command: ["-port", "8082", "-name", "backend-2"]
    ports:
      - "8082:8082"

  backend-3:
    build:
      context: .
      target: backend
    command: ["-port", "8083", "-name", "backend-3"]
    ports:
      - "8083:8083"

  # =============================================
  # API Gateway
  # =============================================
  gateway:
    build:
      context: .
      target: gateway
    command: ["-config", "config/gateway.docker.yaml"]
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=my-secret-key
    depends_on:
      redis:
        condition: service_healthy
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
      backend-3:
        condition: service_started
